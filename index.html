<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMC ICU Protocol</title>
    <script src="settings-init.js?v=1776350000"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=1776350000">
    <style>
        /* ============================================================
           Main page — Refined Clinical Editorial
           Icons carry color; cards stay neutral.
           ============================================================ */

        /* ---- Search results ---- */
        .search { position: relative; z-index: 10; }

        .search__clear {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            width: 28px; height: 28px; border-radius: 50%;
            background: var(--bg-subtle); border: none; cursor: pointer;
            display: none; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .search__clear svg {
            width: 14px; height: 14px; stroke: var(--text-tertiary);
            stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round;
        }
        .search__clear:hover { background: var(--border-subtle); }
        .search__clear.show { display: flex; }

        .search-results {
            position: absolute;
            left: 24px; right: 24px;
            top: calc(100% - 10px);
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--r-lg);
            box-shadow: 0 12px 32px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.06);
            max-height: 360px; overflow-y: auto;
            display: none; flex-direction: column;
            -webkit-overflow-scrolling: touch;
            z-index: 10;
        }
        .search-results.show { display: flex; }

        /* When search is active, let header show overflow so dropdown is visible */
        .header.search-open { overflow: visible !important; }

        .search-results__empty {
            padding: 28px 18px; text-align: center;
            font-size: 13px; color: var(--text-tertiary); font-weight: 500;
        }

        .sr-group-label {
            padding: 10px 16px 4px;
            font-size: 10px; font-weight: 800; letter-spacing: 1px;
            text-transform: uppercase; color: var(--text-tertiary);
        }
        .sr-group-label:not(:first-child) { border-top: 1px solid var(--border-subtle); margin-top: 2px; }

        .sr-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px; cursor: pointer;
            transition: background 0.15s;
        }
        .sr-item:last-child { border-radius: 0 0 var(--r-lg) var(--r-lg); }
        .sr-item:hover, .sr-item.is-focused { background: var(--bg-subtle); }

        .sr-item__icon {
            width: 32px; height: 32px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .sr-item__icon svg {
            width: 15px; height: 15px; stroke: currentColor;
            stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round;
        }
        .sr-item__icon--protocol {
            background: color-mix(in srgb, var(--smc-blue) 10%, #fff);
            color: var(--smc-blue);
        }
        .sr-item__icon--section {
            background: color-mix(in srgb, var(--cat-procedure, #334155) 10%, #fff);
            color: var(--cat-procedure, #334155);
        }
        .sr-item__icon--calculator {
            background: color-mix(in srgb, var(--smc-orange, #e67700) 10%, #fff);
            color: var(--smc-orange, #e67700);
        }

        .sr-item__body { flex: 1; min-width: 0; }
        .sr-item__title {
            font-size: 13.5px; font-weight: 700; color: var(--text-primary);
            line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .sr-item__title mark {
            background: color-mix(in srgb, var(--smc-blue) 18%, #fff);
            color: inherit; border-radius: 2px; padding: 0 1px;
        }
        .sr-item__meta {
            font-size: 11px; color: var(--text-tertiary); font-weight: 500;
            margin-top: 1px;
        }
        .sr-item__arrow {
            width: 18px; height: 18px; flex-shrink: 0;
        }
        .sr-item__arrow svg {
            width: 14px; height: 14px; stroke: var(--text-tertiary); stroke-width: 2;
            fill: none; stroke-linecap: round; stroke-linejoin: round;
        }

        /* Dim category cards when search is active */
        .main--brand.search-active { opacity: 0.3; pointer-events: none; transition: opacity 0.2s; }

        /* Backdrop to close search */
        .search-backdrop {
            position: fixed; inset: 0; z-index: 5; display: none;
        }
        .search-backdrop.show { display: block; }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .cat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--r-lg);
            padding: 12px 14px 10px;
            cursor: pointer;
            transition: transform 0.35s var(--ease-out), box-shadow 0.35s var(--ease-out), border-color 0.35s var(--ease-out);
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-xs);
            min-height: 96px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            animation: slideFade 0.5s var(--ease-out) both;
        }

        /* Always-visible category signal stripe (subtle until hover) */
        .cat-card::before {
            content: '';
            position: absolute;
            left: 0; top: 16px; bottom: 16px;
            width: 2px;
            background: var(--cat-color);
            opacity: 0.35;
            border-radius: 0 2px 2px 0;
            transition: all 0.35s var(--ease-out);
        }

        .cat-card:hover {
            transform: translateY(-3px);
            border-color: color-mix(in srgb, var(--cat-color) 45%, var(--border-subtle));
            box-shadow: 0 12px 28px color-mix(in srgb, var(--cat-color) 12%, transparent), var(--shadow-sm);
        }

        .cat-card:hover::before {
            opacity: 1;
            width: 3px;
            top: 0; bottom: 0;
        }

        .cat-card__top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        /* Icon — circular soft tint + colored outline icon */
        .cat-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--tile-bg, #eef3fc);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.35s var(--ease-spring);
            position: relative;
        }

        /* subtle ring halo on hover */
        .cat-icon::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1px solid color-mix(in srgb, var(--cat-color) 30%, transparent);
            opacity: 0;
            transition: opacity 0.3s var(--ease-out);
        }

        .cat-card:hover .cat-icon {
            background: color-mix(in srgb, var(--cat-color) 12%, #eef3fc);
            transform: scale(1.06);
        }

        .cat-card:hover .cat-icon::after { opacity: 1; }

        .cat-icon svg {
            width: 22px;
            height: 22px;
            color: var(--icon-ink);
            fill: currentColor;
            stroke: currentColor;
            overflow: visible;
        }
        .cat-icon svg.is-stroke { fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
        .cat-card:hover .cat-icon svg { color: var(--smc-blue); }

        .cat-card__chev {
            width: 24px; height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateX(-4px);
            transition: all 0.3s var(--ease-out);
            background: var(--cat-color);
        }

        .cat-card__chev svg {
            width: 11px; height: 11px;
            stroke: #fff;
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .cat-card.is-ready:hover .cat-card__chev {
            opacity: 1;
            transform: translateX(0);
        }

        .cat-card__name {
            font-size: 15px;
            font-weight: 800;
            letter-spacing: -0.35px;
            color: var(--text-primary);
            line-height: 1.2;
            position: relative;
            z-index: 1;
            margin-bottom: 8px;
        }

        .cat-card__foot {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            position: relative;
            z-index: 1;
            padding-top: 8px;
            border-top: 1px dashed var(--border-subtle);
        }

        .cat-card__count {
            font-size: 10.5px;
            font-weight: 700;
            color: var(--text-tertiary);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-variant-numeric: tabular-nums;
        }

        .cat-card__count b {
            color: var(--cat-color);
            font-weight: 800;
            margin-right: 2px;
        }

        .cat-card__badge {
            font-size: 9px;
            font-weight: 800;
            padding: 3px 7px;
            border-radius: 999px;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            background: var(--bg-subtle);
            color: var(--text-tertiary);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .cat-card__badge::before {
            content: '';
            width: 5px; height: 5px;
            border-radius: 50%;
            background: currentColor;
        }

        .cat-card.is-ready .cat-card__badge {
            background: color-mix(in srgb, var(--cat-color) 12%, #fff);
            color: var(--cat-color);
        }

        .cat-card.is-pending { opacity: 0.78; }
        .cat-card.is-pending:hover { opacity: 1; }

        /* Category color mapping (SMC point colors — saturation held back via tints) */
        .cat-card.neurology   { --cat-color: var(--cat-neurology); }
        .cat-card.cardiology  { --cat-color: var(--cat-cardiology); }
        .cat-card.pulmonology { --cat-color: var(--cat-pulmonology); }
        .cat-card.gi          { --cat-color: var(--cat-gi); }
        .cat-card.nephrology  { --cat-color: var(--cat-nephrology); }
        .cat-card.infection   { --cat-color: var(--cat-infection); }
        .cat-card.procedure   { --cat-color: var(--cat-procedure); }

        .cat-card:nth-child(1) { animation-delay: 0.05s; }
        .cat-card:nth-child(2) { animation-delay: 0.10s; }
        .cat-card:nth-child(3) { animation-delay: 0.15s; }
        .cat-card:nth-child(4) { animation-delay: 0.20s; }
        .cat-card:nth-child(5) { animation-delay: 0.25s; }
        .cat-card:nth-child(6) { animation-delay: 0.30s; }
        .cat-card:nth-child(7) { animation-delay: 0.35s; }

        /* Dark theme — index-specific */
        html[data-theme="dark"] .cat-icon {
            background: #1c2333;
        }
        html[data-theme="dark"] .cat-card:hover .cat-icon {
            background: color-mix(in srgb, var(--cat-color) 15%, #1c2333);
        }
        html[data-theme="dark"] .search-results {
            background: #161b22;
            border-color: #2a3140;
        }

        /* ---- Recently Viewed ---- */
        .recent-section { margin-bottom: 6px; }
        .recent-section .section__head { margin-bottom: 10px; }
        .recent-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 6px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .recent-scroll::-webkit-scrollbar { display: none; }

        .recent-card {
            position: relative;
            flex: 0 0 auto;
            width: 150px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--r-md);
            padding: 12px 13px 10px;
            cursor: pointer;
            scroll-snap-align: start;
            transition: border-color 0.2s, background 0.2s, transform 0.25s var(--ease-out);
            animation: slideFade 0.4s var(--ease-out) both;
        }
        .recent-card__close {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: transparent;
            border: none;
            display: grid;
            place-items: center;
            cursor: pointer;
            color: var(--text-tertiary);
            opacity: 0.6;
            transition: opacity 0.15s, background 0.15s, color 0.15s;
            padding: 0;
        }
        .recent-card__close:hover {
            opacity: 1;
            background: color-mix(in srgb, var(--text-primary) 8%, transparent);
            color: var(--text-primary);
        }
        .recent-card__close svg {
            width: 12px;
            height: 12px;
            stroke: currentColor;
            stroke-width: 2.4;
            fill: none;
            stroke-linecap: round;
        }
        .recent-card:nth-child(1) { animation-delay: 0.03s; }
        .recent-card:nth-child(2) { animation-delay: 0.07s; }
        .recent-card:nth-child(3) { animation-delay: 0.10s; }
        .recent-card:nth-child(4) { animation-delay: 0.13s; }
        .recent-card:nth-child(5) { animation-delay: 0.16s; }

        .recent-card:hover {
            border-color: color-mix(in srgb, var(--smc-blue) 40%, var(--border-subtle));
            background: color-mix(in srgb, var(--smc-blue) 3%, #fff);
            transform: translateY(-2px);
        }
        .recent-card__eyebrow {
            font-size: 9.5px;
            font-weight: 800;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--smc-blue);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .recent-card__title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            letter-spacing: -0.15px;
            margin-bottom: 8px;
        }
        .recent-card__time {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-tertiary);
        }

        /* Dark overrides */
        html[data-theme="dark"] .recent-card:hover {
            background: color-mix(in srgb, var(--smc-blue) 6%, #161b22);
            border-color: color-mix(in srgb, var(--smc-blue) 35%, #2a3140);
        }

    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header header--brand">
            <div class="header__top">
                <div class="header__brand">SMC ICU Protocol</div>
                <button class="icon-btn" aria-label="Settings" onclick="window.location.href='settings.html'">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </button>
            </div>
            <div class="search">
                <div class="search__icon">
                    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                </div>
                <input type="text" class="search__input" placeholder="Search protocols & calculators..." id="searchInput" autocomplete="off">
                <button class="search__clear" id="searchClear" aria-label="Clear">
                    <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <!-- Search results — inside header, overflow toggled by JS -->
            <div class="search-results" id="searchResults"></div>
        </header>

        <!-- Main -->
        <main class="main main--brand">
            <!-- Recently Viewed -->
            <section class="section recent-section" id="recentSection" style="display:none">
                <div class="section__head">
                    <div class="section__title">Recently Viewed</div>
                </div>
                <div class="recent-scroll" id="recentScroll"></div>
            </section>

            <!-- Categories -->
            <section class="section">
                <div class="section__head">
                    <div class="section__title section__title--lg">Categories</div>
                    <div class="section__meta">7 AREAS</div>
                </div>

                <div class="category-grid">
                    <!-- Neurology — brain with visible gyri/sulci -->
                    <div class="cat-card neurology is-ready" data-href="neurology.html">
                        <div>
                            <div class="cat-card__top">
                                <div class="cat-icon">
                                    <!-- Phosphor brain-fill -->
                                    <svg viewBox="0 0 256 256"><path d="M212,76V72a44,44,0,0,0-74.86-31.31,3.93,3.93,0,0,0-1.14,2.8v88.72a4,4,0,0,0,6.2,3.33A47.67,47.67,0,0,1,167.68,128a8.18,8.18,0,0,1,8.31,7.58,8,8,0,0,1-8,8.42,32,32,0,0,0-32,32v33.88a4,4,0,0,0,1.49,3.12,47.92,47.92,0,0,0,74.21-17.16,4,4,0,0,0-4.49-5.56A68.06,68.06,0,0,1,192,192h-7.73a8.18,8.18,0,0,1-8.25-7.47,8,8,0,0,1,8-8.53h8a51.6,51.6,0,0,0,24-5.88v0A52,52,0,0,0,212,76Zm-12,36h-4a36,36,0,0,1-36-36V72a8,8,0,0,1,16,0v4a20,20,0,0,0,20,20h4a8,8,0,0,1,0,16ZM88,28A44.05,44.05,0,0,0,44,72v4a52,52,0,0,0-4,94.12h0A51.6,51.6,0,0,0,64,176h7.73A8.18,8.18,0,0,1,80,183.47,8,8,0,0,1,72,192H64a67.48,67.48,0,0,1-15.21-1.73,4,4,0,0,0-4.5,5.55A47.93,47.93,0,0,0,118.51,213a4,4,0,0,0,1.49-3.12V176a32,32,0,0,0-32-32,8,8,0,0,1-8-8.42A8.18,8.18,0,0,1,88.32,128a47.67,47.67,0,0,1,25.48,7.54,4,4,0,0,0,6.2-3.33V43.49a4,4,0,0,0-1.14-2.81A43.85,43.85,0,0,0,88,28Zm8,48a36,36,0,0,1-36,36H56a8,8,0,0,1,0-16h4A20,20,0,0,0,80,76V72a8,8,0,0,1,16,0Z"/></svg>
                                </div>
                                <div class="cat-card__chev"><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></div>
                            </div>
                            <div class="cat-card__name">Neurology</div>
                        </div>
                        <div class="cat-card__foot">
                            <div class="cat-card__count"><b>3</b>protocols</div>
                        </div>
                    </div>

                    <!-- Cardiology — heart filled with white ECG pulse -->
                    <div class="cat-card cardiology is-ready" data-href="cardiology.html">
                        <div>
                            <div class="cat-card__top">
                                <div class="cat-icon">
                                    <!-- Phosphor heart-straight-fill — clean solid heart -->
                                    <svg viewBox="0 0 256 256"><path d="M178,36c-21,0-39.26,9.47-50,25.34C117.26,45.47,99,36,78,36A62.07,62.07,0,0,0,16,98c0,74,103.79,130.66,108.21,133a8,8,0,0,0,7.58,0C136.21,228.66,240,172,240,98A62.07,62.07,0,0,0,178,36Z"/></svg>
                                </div>
                                <div class="cat-card__chev"><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></div>
                            </div>
                            <div class="cat-card__name">Cardiology</div>
                        </div>
                        <div class="cat-card__foot">
                            <div class="cat-card__count"><b>4</b>protocols</div>
                        </div>
                    </div>

                    <!-- Pulmonology — inflated lungs with trachea/carina -->
                    <div class="cat-card pulmonology is-ready" data-href="pulmonology.html">
                        <div>
                            <div class="cat-card__top">

            {t:'calc', title:'Drug Infusion Rate', cat:'Pharmacology', href:'calc-drip.html',
             keys:'drip norepinephrine epinephrine dopamine dobutamine vasopressin milrinone midazolam propofol fentanyl dexmedetomidine infusion rate mcg/kg/min'},
        ];

        // Pre-compute searchable string (title + cat + parent + keys)
        SEARCH_DATA.forEach(d => {
            d._lc = [d.title, d.cat, d.parent || '', d.keys || ''].join(' ').toLowerCase();
        });

        const searchInput    = document.getElementById('searchInput');
        const searchResults  = document.getElementById('searchResults');
        const searchClear    = document.getElementById('searchClear');
        const searchBackdrop = document.getElementById('searchBackdrop');
        const mainContent    = document.querySelector('.main--brand');
        let focusIdx = -1;

        function escapeRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

        function highlightMatch(text, query) {
            if (!query) return text;
            const re = new RegExp('(' + escapeRe(query) + ')', 'gi');
            return text.replace(re, '<mark>$1</mark>');
        }

        function doSearch(raw) {
            const q = raw.trim().toLowerCase();
            searchClear.classList.toggle('show', raw.length > 0);

            if (!q) { closeSearch(); return; }

            const matches = SEARCH_DATA.filter(d => d._lc.includes(q));

            // Group by type
            const protocols = matches.filter(d => d.t === 'protocol');
            const sections  = matches.filter(d => d.t === 'section');
            const calcs     = matches.filter(d => d.t === 'calc');

            searchResults.innerHTML = '';

            if (matches.length === 0) {
                searchResults.innerHTML = '<div class="search-results__empty">No results for "' + raw.trim().replace(/</g,'&lt;') + '"</div>';
                openSearch();
                return;
            }

            if (protocols.length) {
                searchResults.innerHTML += '<div class="sr-group-label">Protocols</div>';
                protocols.forEach(d => searchResults.appendChild(makeItem(d, raw.trim())));
            }
            if (sections.length) {
                searchResults.innerHTML += '<div class="sr-group-label">Sections</div>';
                sections.forEach(d => searchResults.appendChild(makeItem(d, raw.trim())));
            }
            if (calcs.length) {
                searchResults.innerHTML += '<div class="sr-group-label">Calculators</div>';
                calcs.forEach(d => searchResults.appendChild(makeItem(d, raw.trim())));
            }

            focusIdx = -1;
            openSearch();
        }

        function makeItem(d, query) {
            const el = document.createElement('div');
            el.className = 'sr-item';
            el.dataset.href = d.href;

            let iconClass, iconSvg, meta;
            if (d.t === 'calc') {
                iconClass = 'sr-item__icon--calculator';
                iconSvg = '<svg viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 6h8M8 10h2M12 10h2M16 10h.01M8 14h2M12 14h2M16 14h.01M8 18h8"/></svg>';
                meta = d.cat;
            } else if (d.t === 'section') {
                iconClass = 'sr-item__icon--section';
                iconSvg = '<svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h10M4 18h14"/></svg>';
                meta = d.parent + ' · ' + d.cat;
            } else {
                iconClass = 'sr-item__icon--protocol';
                iconSvg = '<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8m8 4H8"/></svg>';
                meta = d.cat;
            }

            el.innerHTML = `
                <div class="sr-item__icon ${iconClass}">${iconSvg}</div>
                <div class="sr-item__body">
                    <div class="sr-item__title">${highlightMatch(d.title, query)}</div>
                    <div class="sr-item__meta">${meta}</div>
                </div>
                <div class="sr-item__arrow"><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></div>
            `;

            el.addEventListener('click', () => {
                window.location.href = d.href;
            });

            return el;
        }

        const headerEl = document.querySelector('.header');

        function openSearch() {
            headerEl.classList.add('search-open');
            searchResults.classList.add('show');
            searchBackdrop.classList.add('show');
            mainContent.classList.add('search-active');
        }

        function closeSearch() {
            headerEl.classList.remove('search-open');
            searchResults.classList.remove('show');
            searchBackdrop.classList.remove('show');
            mainContent.classList.remove('search-active');
            focusIdx = -1;
        }

        function clearSearch() {
            searchInput.value = '';
            searchClear.classList.remove('show');
            closeSearch();
            searchInput.blur();
        }

        /* Events */
        searchInput.addEventListener('input', () => doSearch(searchInput.value));
        searchInput.addEventListener('focus', () => { if (searchInput.value.trim()) doSearch(searchInput.value); });
        searchClear.addEventListener('click', clearSearch);
        searchBackdrop.addEventListener('click', clearSearch);

        /* Keyboard navigation */
        searchInput.addEventListener('keydown', (e) => {
            const items = searchResults.querySelectorAll('.sr-item');
            if (!items.length) {
                if (e.key === 'Escape') clearSearch();
                return;
            }

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                focusIdx = Math.min(focusIdx + 1, items.length - 1);
                updateFocus(items);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                focusIdx = Math.max(focusIdx - 1, 0);
                updateFocus(items);
            } else if (e.key === 'Enter' && focusIdx >= 0) {
                e.preventDefault();
                items[focusIdx].click();
            } else if (e.key === 'Escape') {
                clearSearch();
            }
        });

        function updateFocus(items) {
            items.forEach((el, i) => el.classList.toggle('is-focused', i === focusIdx));
            if (focusIdx >= 0) items[focusIdx].scrollIntoView({ block: 'nearest' });
        }

        /* ============================================================
           Recently Viewed — render stored entries
           ============================================================ */
        (function () {
            var KEY = 'smc-recent-pages';
            try {
                var list = JSON.parse(localStorage.getItem(KEY) || '[]');
                if (!list.length) return;

                var section = document.getElementById('recentSection');
                var scroll  = document.getElementById('recentScroll');
                if (!section || !scroll) return;

                function relativeTime(ts) {
                    var diff = Math.floor((Date.now() - ts) / 1000);
                    if (diff < 60) return 'Just now';
                    var m = Math.floor(diff / 60);
                    if (m < 60) return m + 'm ago';
                    var h = Math.floor(m / 60);
                    if (h < 24) return h + 'h ago';
                    var d = Math.floor(h / 24);
                    if (d === 1) return 'Yesterday';
                    if (d < 7) return d + 'd ago';
                    return new Date(ts).toLocaleDateString();
                }

                function removeEntry(href) {
                    try {
                        var cur = JSON.parse(localStorage.getItem(KEY) || '[]');
                        cur = cur.filter(function (e) { return e.href !== href; });
                        localStorage.setItem(KEY, JSON.stringify(cur));
                    } catch (e) { /* ignore */ }
                }

                list.forEach(function (entry) {
                    var card = document.createElement('div');
                    card.className = 'recent-card';
                    card.innerHTML =
                        '<button class="recent-card__close" aria-label="Remove">' +
                            '<svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>' +
                        '</button>' +
                        '<div class="recent-card__eyebrow">' + (entry.eyebrow || '') + '</div>' +
                        '<div class="recent-card__title">' + (entry.title || '') + '</div>' +
                        '<div class="recent-card__time">' + relativeTime(entry.time) + '</div>';
                    card.addEventListener('click', function () {
                        window.location.href = entry.href;
                    });
                    card.querySelector('.recent-card__close').addEventListener('click', function (ev) {
                        ev.stopPropagation();
                        removeEntry(entry.href);
                        card.remove();
                        if (!scroll.children.length) section.style.display = 'none';
                    });
                    scroll.appendChild(card);
                });

                section.style.display = '';
            } catch (e) { /* ignore */ }
        })();
    </script>
