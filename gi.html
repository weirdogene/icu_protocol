    <style>
        .protocol-list { display: flex; flex-direction: column; gap: 10px; }
        .protocol-card {
            background: var(--bg-card); border: 1px solid var(--border-subtle);
            border-radius: var(--r-lg); padding: 16px 18px; cursor: pointer;
            transition: transform 0.25s var(--ease-out), border-color 0.25s var(--ease-out), box-shadow 0.25s var(--ease-out);
            position: relative; overflow: hidden; animation: slideFade 0.45s var(--ease-out) both;
        }
        .protocol-card::before {
            content: ''; position: absolute; left: 0; top: 14px; bottom: 14px; width: 2px;
            background: var(--cat-color); opacity: 0.45; border-radius: 0 2px 2px 0;
            transition: opacity 0.25s, width 0.25s;
        }
        .protocol-card:hover {
            transform: translateY(-2px);
            border-color: color-mix(in srgb, var(--smc-blue) 35%, var(--border-subtle));
            box-shadow: 0 8px 20px rgba(20, 40, 160, 0.06);
        }
        .protocol-card:hover::before { opacity: 1; width: 3px; }
        .protocol-card:nth-child(1) { animation-delay: 0.04s; }
        .protocol-card:nth-child(2) { animation-delay: 0.09s; }
        .protocol-card:nth-child(3) { animation-delay: 0.14s; }
        .protocol-card:nth-child(4) { animation-delay: 0.19s; }
        .protocol-card:nth-child(5) { animation-delay: 0.24s; }
        .protocol-card:nth-child(6) { animation-delay: 0.29s; }
        .protocol-card__head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
        .protocol-card__num {
            font-size: 10px; font-weight: 800; letter-spacing: 1px;
            color: var(--cat-color); background: color-mix(in srgb, var(--cat-color) 12%, #fff);
            padding: 4px 8px; border-radius: 6px; flex-shrink: 0; font-variant-numeric: tabular-nums;
        }
        .protocol-card__title {
            font-size: 15.5px; font-weight: 800; letter-spacing: -0.4px;
            color: var(--text-primary); line-height: 1.3; flex: 1;
        }
        .protocol-card__title .star {
            color: var(--smc-orange); margin-left: 6px; font-size: 13px;
        }
        .protocol-card__arrow {
            width: 24px; height: 24px; border-radius: 50%; background: var(--bg-subtle);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            transition: background 0.25s, transform 0.25s var(--ease-spring);
        }
        .protocol-card__arrow svg {
            width: 12px; height: 12px; stroke: var(--text-tertiary);
            stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round;
            transition: stroke 0.25s;
        }
        .protocol-card:hover .protocol-card__arrow { background: var(--smc-blue); transform: translateX(3px); }
        .protocol-card:hover .protocol-card__arrow svg { stroke: #fff; }
        .protocol-card__desc { font-size: 12.5px; color: var(--text-secondary); line-height: 1.55; }
        .protocol-card__foot {
            margin-top: 12px; padding-top: 10px; border-top: 1px dashed var(--border-subtle);
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
            font-size: 10.5px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase;
            color: var(--text-tertiary); font-variant-numeric: tabular-nums;
            flex-wrap: wrap;
        }
        .protocol-card__meta {
            display: flex; align-items: center; gap: 6px;
        }
        .protocol-card__foot svg {
            width: 11px; height: 11px; stroke: currentColor; stroke-width: 2; fill: none;
            stroke-linecap: round; stroke-linejoin: round; opacity: 0.7;
        }
        .container { --cat-color: var(--cat-gi); }
    
        /* Dark theme — inline overrides */
        html[data-theme="dark"] .protocol-card__num {
            background: color-mix(in srgb, var(--cat-color) 15%, #161b22);
        }
        html[data-theme="dark"] .protocol-card {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        html[data-theme="dark"] .protocol-card:hover {
            border-color: color-mix(in srgb, var(--smc-blue) 35%, #2a3140);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        html[data-theme="dark"] .protocol-card__arrow {
            background: #1c2333;
        }
    </style>
</head>

    <script>
        const toast = document.getElementById('toast');
        let toastTimer;
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
        }
        document.querySelectorAll('.protocol-card').forEach(card => {
            card.addEventListener('click', function() {
                const href = this.dataset.href;
                if (href) { window.location.href = href; return; }
                const title = this.querySelector('.protocol-card__title').textContent.replace('★','').trim();
                showToast(`${title} — Coming soon`);
            });
        });
        document.querySelectorAll('[data-nav-toast]').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                showToast(`${el.dataset.navToast} — Coming soon`);
            });
        });
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                if (this.classList.contains('active')) return;
                if (this.getAttribute('onclick')) return;
                showToast(`${this.querySelector('.nav-item__label').textContent} — Coming soon`);
            });
        });
    </script>
