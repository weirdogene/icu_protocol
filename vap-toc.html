<script>
const toast=document.getElementById('toast');let t;
function showToast(m){toast.textContent=m;toast.classList.add('show');clearTimeout(t);t=setTimeout(()=>toast.classList.remove('show'),1600);}
document.querySelectorAll('[data-toast]').forEach(e=>e.addEventListener('click',ev=>{ev.stopPropagation();showToast(e.dataset.toast);}));
document.querySelectorAll('.nav-item').forEach(i=>i.addEventListener('click',function(){if(this.classList.contains('active'))return;if(this.getAttribute('onclick'))return;showToast(this.querySelector('.nav-item__label').textContent+' — Coming soon');}));

(function(){
  const btn=document.querySelector('.icon-btn--bookmark');
  if(!btn) return;
  const key='smc-bookmark:'+(location.pathname.split('/').pop()||'index');
  let saved=false;
  try{ saved=localStorage.getItem(key)==='1'; }catch(e){}
  if(saved){ btn.classList.add('is-saved'); btn.setAttribute('aria-pressed','true'); }
  btn.addEventListener('click',function(ev){
    ev.stopPropagation();
    saved=!saved;
    btn.classList.toggle('is-saved',saved);
    btn.setAttribute('aria-pressed',saved?'true':'false');
    btn.classList.remove('is-animating'); void btn.offsetWidth; btn.classList.add('is-animating');
    setTimeout(()=>btn.classList.remove('is-animating'),650);
    try{ saved?localStorage.setItem(key,'1'):localStorage.removeItem(key); }catch(e){}
    if(typeof showToast==='function') showToast(saved?'Saved':'Removed from saved');
  });
})();
</script>
